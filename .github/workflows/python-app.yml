name: Python application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build_executable:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies & drop pathlib backport
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path 'requirements.txt') {
            pip install -r requirements.txt
          }
          pip uninstall -y pathlib
          pip install pyinstaller

      - name: Clean old build output
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist, build -ErrorAction SilentlyContinue

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm gui_main.spec

      - name: Upload standalone .exe
        uses: actions/upload-artifact@v4
        with:
          name: swat_processor_windows
          path: dist/swat_processor   # ← point at the directory, not a single file
